<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Controle de Horas</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #05070f;
      --surface: rgba(15, 23, 42, 0.9);
      --surface-strong: rgba(15, 23, 42, 1);
      --card: rgba(15, 23, 42, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #2563eb;
      --danger: #f87171;
      --shadow: 0 30px 60px rgba(0, 0, 0, 0.28);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 25%),
        linear-gradient(180deg, #02040a 0%, #05070f 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 12%),
        radial-gradient(circle at left, rgba(59, 130, 246, 0.08), transparent 12%);
      pointer-events: none;
    }

    .container {
      width: min(460px, 100%);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(10, 14, 26, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
      margin-bottom: 24px;
    }

    .topbar span {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.8rem;
    }

    .title {
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: -0.04em;
    }

    .cards {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 22px;
      display: grid;
      gap: 12px;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.28);
    }

    .card h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .valor {
      font-size: clamp(2rem, 4vw, 2.6rem);
      font-weight: 700;
      color: #f8fafc;
    }

    button {
      background: #111827;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card button,
    .confirmar,
    .reset-btn,
    .modal button,
    .reset-buttons button {
      padding: 14px 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .card button:hover,
    .confirmar:hover,
    .reset-btn:hover,
    .modal button:hover,
    .reset-buttons button:hover {
      background: #1f2937;
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .total {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 24px;
      padding: 22px;
      text-align: center;
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .total h2 {
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #totalGeral {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
    }

    .reset-btn {
      background: #111827;
      color: var(--text);
      padding: 14px 16px;
    }

    .reset-btn:hover {
      background: #1f2937;
    }

    .historico {
      margin-top: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.08);
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .historico h2 {
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #listaHistorico {
      display: grid;
      gap: 12px;
      max-height: 260px;
      overflow-y: auto;
      min-height: 88px;
      padding-right: 2px;
    }

    .item-historico {
      background: rgba(7, 10, 18, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .item-historico span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .item-historico strong {
      color: #f8fafc;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(3, 7, 16, 0.75);
      z-index: 20;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: min(400px, 100%);
      background: rgba(15, 23, 42, 0.98);
      border-radius: 28px;
      padding: 28px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: var(--shadow);
      text-align: center;
      display: grid;
      gap: 20px;
    }

    .modal-content h2 {
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .time-selector {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .box {
      background: rgba(7, 10, 18, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .box h3 {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .box button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      background: #111827;
      color: var(--text);
      font-size: 1.35rem;
    }

    .box button:hover {
      background: #1f2937;
      transform: translateY(-1px);
    }

    .number {
      width: 56px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .confirmar {
      background: #111827;
      color: var(--text);
      padding: 14px 16px;
      font-weight: 700;
    }

    .confirmar:hover {
      background: #1f2937;
      transform: translateY(-1px);
    }

    .reset-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .reset-buttons button {
      flex: 1 1 140px;
      padding: 12px 14px;
      background: #111827;
      color: var(--text);
    }

    .reset-buttons button:last-child {
      background: #1f2937;
      color: var(--text);
    }

    .reset-buttons button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    @media (max-width: 420px) {
      .container {
        padding: 20px;
      }

      .time-selector {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <span id="mesAtual">Carregando...</span>
      <h1 class="title">Controle de Horas</h1>
    </div>

    <section class="cards">
      <article class="card">
        <div>
          <h2>Campo</h2>
          <p class="valor" id="campoValor">00:00</p>
        </div>
        <button type="button" data-type="campo">Adicionar</button>
      </article>

      <article class="card">
        <div>
          <h2>Crédito</h2>
          <p class="valor" id="creditoValor">00:00</p>
        </div>
        <button type="button" data-type="credito">Adicionar</button>
      </article>
    </section>

    <section class="historico">
      <h2>Histórico</h2>
      <div id="listaHistorico">Nenhum registro ainda.</div>
    </section>

    <section class="total">
      <h2>Total Geral</h2>
      <div id="totalGeral">00:00</div>
      <button type="button" class="reset-btn">Zerar Tudo</button>
    </section>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Adicionar Tempo</h2>
      <div class="time-selector">
        <div class="box">
          <h3>Horas</h3>
          <div class="controls">
            <button type="button" data-action="hour" data-value="-1">-</button>
            <span class="number" id="horas">0</span>
            <button type="button" data-action="hour" data-value="1">+</button>
          </div>
        </div>
        <div class="box">
          <h3>Minutos</h3>
          <div class="controls">
            <button type="button" data-action="minute" data-value="-5">-</button>
            <span class="number" id="minutos">0</span>
            <button type="button" data-action="minute" data-value="5">+</button>
          </div>
        </div>
      </div>
      <button type="button" class="confirmar">Confirmar</button>
    </div>
  </div>

  <div class="modal" id="resetModal">
    <div class="modal-content">
      <h2>Deseja zerar tudo?</h2>
      <p>Essa ação não poderá ser desfeita.</p>
      <div class="reset-buttons">
        <button type="button" class="cancel-reset">Cancelar</button>
        <button type="button" class="confirm-reset">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      currentType: 'campo',
      hours: 0,
      minutes: 0,
      entries: []
    };

    const elements = {
      mesAtual: document.getElementById('mesAtual'),
      campoValor: document.getElementById('campoValor'),
      creditoValor: document.getElementById('creditoValor'),
      totalGeral: document.getElementById('totalGeral'),
      listaHistorico: document.getElementById('listaHistorico'),
      modal: document.getElementById('modal'),
      resetModal: document.getElementById('resetModal'),
      horas: document.getElementById('horas'),
      minutos: document.getElementById('minutos'),
      adicionarBotoes: document.querySelectorAll('[data-type]'),
      resetBtn: document.querySelector('.reset-btn'),
      confirmBtn: document.querySelector('.confirmar'),
      cancelResetBtn: document.querySelector('.cancel-reset'),
      confirmResetBtn: document.querySelector('.confirm-reset'),
      modalButtons: document.querySelectorAll('[data-action]')
    };

    const formatTime = totalMinutes => {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    };

    const updateTotals = () => {
      const campoTotal = state.entries
        .filter(entry => entry.type === 'campo')
        .reduce((sum, entry) => sum + entry.minutes, 0);

      const creditoTotal = state.entries
        .filter(entry => entry.type === 'credito')
        .reduce((sum, entry) => sum + entry.minutes, 0);

      elements.campoValor.textContent = formatTime(campoTotal);
      elements.creditoValor.textContent = formatTime(creditoTotal);
      elements.totalGeral.textContent = formatTime(campoTotal + creditoTotal);
    };

    const createHistoryItem = entry => {
      const item = document.createElement('div');
      item.className = 'item-historico';
      item.innerHTML = `
        <div><strong>${entry.type === 'campo' ? 'Campo' : 'Crédito'}</strong> — ${formatTime(entry.minutes)}</div>
        <span>${entry.label} • ${entry.timestamp}</span>
      `;
      return item;
    };

    const renderHistory = () => {
      elements.listaHistorico.innerHTML = '';
      if (state.entries.length === 0) {
        elements.listaHistorico.textContent = 'Nenhum registro ainda.';
        return;
      }

      state.entries.slice().reverse().forEach(entry => {
        elements.listaHistorico.appendChild(createHistoryItem(entry));
      });
    };

    const saveState = () => {
      localStorage.setItem('controleDeHoras', JSON.stringify(state.entries));
    };

    const loadState = () => {
      const saved = localStorage.getItem('controleDeHoras');
      if (saved) {
        try {
          state.entries = JSON.parse(saved);
        } catch (error) {
          state.entries = [];
        }
      }
    };

    const openModal = type => {
      state.currentType = type;
      state.hours = 0;
      state.minutes = 0;
      elements.horas.textContent = '0';
      elements.minutos.textContent = '0';
      elements.modal.classList.add('show');
      elements.modal.querySelector('h2').textContent = `Adicionar ${type === 'campo' ? 'Campo' : 'Crédito'}`;
    };

    const closeModal = () => elements.modal.classList.remove('show');
    const openReset = () => elements.resetModal.classList.add('show');
    const closeReset = () => elements.resetModal.classList.remove('show');

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    const adjustTime = (field, delta) => {
      if (field === 'hour') {
        state.hours = clamp(state.hours + delta, 0, 24);
      } else {
        state.minutes = clamp(state.minutes + delta, 0, 55);
      }
      elements.horas.textContent = state.hours;
      elements.minutos.textContent = state.minutes;
    };

    const confirmarTempo = () => {
      if (state.hours === 0 && state.minutes === 0) return;

      const totalMinutes = state.hours * 60 + state.minutes;
      const date = new Date();
      state.entries.push({
        type: state.currentType,
        minutes: totalMinutes,
        label: `${state.hours}h ${state.minutes}m`,
        timestamp: date.toLocaleString('pt-BR', {
          day: '2-digit',
          month: '2-digit',
          year: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        })
      });

      saveState();
      renderHistory();
      updateTotals();
      closeModal();
    };

    const zerarTudo = () => {
      state.entries = [];
      saveState();
      renderHistory();
      updateTotals();
      closeReset();
    };

    const setMonthLabel = () => {
      const now = new Date();
      elements.mesAtual.textContent = now.toLocaleDateString('pt-BR', {
        month: 'long',
        year: 'numeric'
      });
    };

    elements.adicionarBotoes.forEach(button => {
      button.addEventListener('click', () => openModal(button.dataset.type));
    });

    elements.modalButtons.forEach(button => {
      button.addEventListener('click', () => adjustTime(button.dataset.action, Number(button.dataset.value)));
    });

    elements.modal.addEventListener('click', event => {
      if (event.target === elements.modal) {
        closeModal();
      }
    });

    elements.resetModal.addEventListener('click', event => {
      if (event.target === elements.resetModal) {
        closeReset();
      }
    });

    elements.confirmBtn.addEventListener('click', confirmarTempo);
    elements.resetBtn.addEventListener('click', openReset);
    elements.cancelResetBtn.addEventListener('click', closeReset);
    elements.confirmResetBtn.addEventListener('click', zerarTudo);

    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModal();
        closeReset();
      }
    });

    loadState();
    setMonthLabel();
    renderHistory();
    updateTotals();
  </script>
</body>

</html>
